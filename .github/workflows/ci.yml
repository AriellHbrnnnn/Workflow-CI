name: MLflow CI Workflow

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run mlflow project
      run: |
        mlflow run MLProject --experiment-name "CI_Retraining" --no-conda
      
    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        RUN_ID=$(ls mlruns/0 -t | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m mlruns/0/${{ env.RUN_ID }}/artifacts/model -n arielhebron/credit-risk-model:latest --install-mlflow

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag arielhebron/credit-risk-model:latest arielhebron/credit-risk-model:${{ github.sha }}

    - name: Push Docker Image
      run: |
        docker push arielhebron/credit-risk-model:latest
        docker push arielhebron/credit-risk-model:${{ github.sha }}

    - name: Complete job
      run: echo "Workflow CI Complete"
